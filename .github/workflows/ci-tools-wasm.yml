name: ci-tools-wasm

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-tools:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust 1.78.0
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.78.0
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tools

      - name: Test Rust tools
        run: cargo test --manifest-path tools/Cargo.toml

      - name: Build WASM artifacts
        run: node scripts/wasm-tools/build.mjs

      - name: Verify WASM artifacts
        run: node scripts/wasm-tools/verify.mjs

      - name: Upload artifact bundle
        uses: actions/upload-artifact@v4
        with:
          name: wasm-tools-dist
          path: dist/tools
          if-no-files-found: error
