services:
  seed-artifacts:
    image: alpine:3.20
    command:
      - sh
      - -lc
      - mkdir -p /artifacts && cp -R /seed-artifacts/. /artifacts/ && ls -R /artifacts
    volumes:
      # Seed the shared volume with the WASM modules that Go will serve.
      - ./backend/artifacts:/seed-artifacts:ro
      - artifacts:/artifacts
    restart: "no"

  back:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      seed-artifacts:
        condition: service_completed_successfully
    environment:
      ARTIFACT_ROOT: /artifacts
      GRPC_PORT: "50051"
      SHUTDOWN_TIMEOUT_SECONDS: "5"
    ports:
      - "50051:50051"
    volumes:
      # Read-only mount used by the Go backend to load and checksum the WASM bytes.
      - artifacts:/artifacts:ro
    healthcheck:
      test: ["CMD-SHELL", "bash -lc 'exec 3<>/dev/tcp/127.0.0.1/50051'"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s

  front:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      back:
        condition: service_healthy
    environment:
      # Next fetches the WASM package from the Go backend over gRPC, then exposes
      # it to the browser through the prepare route.
      GRPC_ENDPOINT: back:50051
      NEXT_TELEMETRY_DISABLED: "1"
      HOSTNAME: 0.0.0.0
      PORT: "3000"
    ports:
      - "3000:3000"

volumes:
  artifacts:
